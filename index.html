<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Naolux Labs — Free Peptide Guide</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #0a0a0a; color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .container { max-width: 560px; padding: 48px 32px; text-align: center; }
    .badge { display: inline-block; background: #c9a84c; color: #000; font-size: 11px; font-weight: 700; letter-spacing: 2px; padding: 6px 16px; border-radius: 20px; margin-bottom: 24px; text-transform: uppercase; }
    h1 { font-size: 2.4rem; font-weight: 800; line-height: 1.2; margin-bottom: 16px; }
    h1 span { color: #c9a84c; }
    p { font-size: 1.05rem; color: #aaa; line-height: 1.7; margin-bottom: 32px; }
    form { display: flex; flex-direction: column; gap: 12px; }
    input { padding: 16px 20px; border-radius: 8px; border: 1px solid #333; background: #111; color: #fff; font-size: 1rem; outline: none; }
    input:focus { border-color: #c9a84c; }
    button { padding: 16px; background: #c9a84c; color: #000; font-size: 1rem; font-weight: 700; border: none; border-radius: 8px; cursor: pointer; letter-spacing: 0.5px; transition: opacity 0.2s; }
    button:hover { opacity: 0.85; }
    .note { font-size: 0.8rem; color: #555; margin-top: 12px; }
    .success { display: none; padding: 20px; background: #111; border: 1px solid #c9a84c; border-radius: 8px; margin-top: 16px; color: #c9a84c; font-weight: 600; }
  </style>
</head>
<body>
  <div class="container">
    <div class="badge">Free Guide</div>
    <h1>The <span>Peptide Protocol</span> to Enhance Your Performance</h1>
    <p>Get our free guide covering the top peptide stacks for recovery, fat loss, and longevity — used by elite athletes who refuse to slow down.</p>
    <form id="form">
      <input type="text" id="name" placeholder="Your first name" required />
      <input type="email" id="email" placeholder="Your email address" required />
      <button type="submit">Send Me the Free Guide →</button>
    </form>
    <p class="note">No spam. Unsubscribe anytime.</p>
    <div class="success" id="success">✓ Your guide is downloading now!</div>
  </div>
  <script>
    document.getElementById('form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      try {
        await fetch('/api/capture', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name, email, source: 'peptide-guide' }) });
      } catch {}
      document.getElementById('form').style.display = 'none';
      document.getElementById('success').style.display = 'block';
      const a = document.createElement('a');
      a.href = 'https://drive.google.com/uc?export=download&id=1MXFkza1n2cZTHyRBVgZvkeE0J6YXqKwo';
      a.download = 'Apex-Part1-Foundations.pdf';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    });
  </script>
</body>
</html>
